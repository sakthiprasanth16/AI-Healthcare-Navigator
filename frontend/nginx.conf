server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # Gzip for faster loads
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
    gzip_min_length 1000;

    # Cache static assets aggressively (Vite fingerprints filenames)
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Proxy API calls to the backend container.
    # Frontend code calls relative path "/api/..." (see lib/api.ts baseURL),
    # so this works no matter what domain/ngrok-URL serves the page.
    location /api/ {
        # "backend" = the service name in docker-compose.yml — Docker's internal
        # DNS resolves this to the backend container's IP on the shared network.
        proxy_pass http://backend:8000/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Generous timeouts — Gemini calls (prescription extraction, recommendations)
        # can take a few seconds longer than typical API calls.
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # SPA fallback — React Router handles /dashboard, /medicines, /spending etc.
    # Without this, refreshing on any route other than "/" returns 404 from Nginx.
    location / {
        try_files $uri $uri/ /index.html;
    }
}