version: "3.9"

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: mednav-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    environment:
      # MONGODB_URI comes from backend/.env (Atlas connection string).
      # No local Mongo container — Atlas is the database.
      - PYTHONUNBUFFERED=1
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - mednav-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # Backend is reached via the host's published port from the browser,
        # NOT via the internal Docker network name (browser can't resolve "backend").
        VITE_API_URL: ${VITE_API_URL:-http://localhost:8000}
    container_name: mednav-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - mednav-network

networks:
  mednav-network:
    driver: bridge
